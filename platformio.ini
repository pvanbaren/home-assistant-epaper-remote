; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
boards_dir = boards

[env:m5-papers3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
; Triggers pioarduino HybridCompile so custom_sdkconfig is honored.
custom_sdkconfig =
    CONFIG_PM_ENABLE=y
    ; Required for esp_pm_configure() to accept light_sleep_enable=true;
    ; without it the call short-circuits with ESP_ERR_NOT_SUPPORTED.
    CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
    ; Default 1024 B is tight under PM (extra lock acquire/release frames in
    ; critical sections); ipc0 stack-canary'd inside esp_intr_alloc.
    CONFIG_ESP_IPC_TASK_STACK_SIZE=2048
    ; Default 300 ms is too tight: with PM hooks active on every ISR, a
    ; FastEPD refresh on Core 1 (delayMicroseconds spin) plus an I2C probe
    ; failure / bus-recovery on Core 0 trips IWDT during touch init.
    CONFIG_ESP_INT_WDT_TIMEOUT_MS=600
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    # -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wl,--gc-sections
    -DARDUINO_USB_MODE=1
    -DTARGET_M5PAPER_S3=1
    ; HybridCompile keeps the stale -Wl,--wrap=log_printf in
    ; framework-arduinoespressif32-libs ld_flags. IDF 5.5.4 renamed
    ; log_printf and changed its signature, so a defsym alias doesn't
    ; work — we supply __wrap_log_printf in src/log_printf_shim.c.
    ; Power management. Light sleep stays off: confirmed it lets the SoC
    ; sleep mid-refresh, collapsing the EPDIY high-voltage rails so the
    ; panel progressively darkens. Re-enabling needs a PM lock held
    ; around FastEPD fullUpdate/partialUpdate (PmRefreshGuard).
    ; -DENABLE_PM_DFS               ; dynamic frequency scaling only
    ; -DENABLE_PM_LIGHT_SLEEP       ; DFS + automatic light sleep
    ; Deep sleep after DEEP_SLEEP_AFTER_STANDBY_MS in standby; wake on home button.
    ; Skipped at runtime on boards without an RTC-capable HOME_BUTTON_PIN.
    ; -DENABLE_DEEP_SLEEP_STANDBY
    ; Dump the GT911 config block on boot — CFG_VERSION, X/Y_OUTPUT_MAX,
    ; MODULE_SWITCH_1, refresh rate, full hex dump, computed vs stored
    ; checksum. Useful for verifying defaults vs. a corrupted config.
    ; -DGT911_DUMP_CONFIG_ON_BOOT
    ; Production: silence Serial/USB-CDC after boot to drop phy power draw.
    ; -DDISABLE_USB_AFTER_BOOT
lib_deps =
    https://github.com/bitbank2/FastEPD.git#main
    bitbank2/bb_captouch@^1.3.2
extra_scripts =
    pre:tools/patch_fastepd_glyph_width.py


[env:lilygo-t5-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = T5-ePaper-S3
framework = arduino
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
upload_speed =  921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Triggers pioarduino HybridCompile so custom_sdkconfig is honored.
custom_sdkconfig =
    CONFIG_PM_ENABLE=y
    ; Required for esp_pm_configure() to accept light_sleep_enable=true;
    ; without it the call short-circuits with ESP_ERR_NOT_SUPPORTED.
    CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
    ; Default 1024 B is tight under PM (extra lock acquire/release frames in
    ; critical sections); ipc0 stack-canary'd inside esp_intr_alloc.
    CONFIG_ESP_IPC_TASK_STACK_SIZE=2048
    ; Default 300 ms is too tight: with PM hooks active on every ISR, a
    ; FastEPD refresh on Core 1 (delayMicroseconds spin) plus an I2C probe
    ; failure / bus-recovery on Core 0 trips IWDT during touch init.
    CONFIG_ESP_INT_WDT_TIMEOUT_MS=600
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -DPSRAM_SPEED=120MHz
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -Wl,--gc-sections
    ;-DCORE_DEBUG_LEVEL=4
    -DTARGET_LILYGO_T5_S3_PRO=1
    ; HybridCompile keeps the stale -Wl,--wrap=log_printf in
    ; framework-arduinoespressif32-libs ld_flags. IDF 5.5.4 renamed
    ; log_printf and changed its signature, so a defsym alias doesn't
    ; work — we supply __wrap_log_printf in src/log_printf_shim.c.
    ; Power management.
    -DENABLE_PM_DFS               ; dynamic frequency scaling only
    -DENABLE_PM_LIGHT_SLEEP       ; DFS + automatic light sleep (deferred to loop())
    ; Deep sleep after DEEP_SLEEP_AFTER_STANDBY_MS in standby; wake on home button.
    ; Skipped at runtime on boards without an RTC-capable HOME_BUTTON_PIN.
    -DENABLE_DEEP_SLEEP_STANDBY
    ; Dump the GT911 config block on boot — CFG_VERSION, X/Y_OUTPUT_MAX,
    ; MODULE_SWITCH_1, refresh rate, full hex dump, computed vs stored
    ; checksum. Useful for verifying defaults vs. a corrupted config.
    ; -DGT911_DUMP_CONFIG_ON_BOOT
    ; Production: silence Serial/USB-CDC after boot to drop phy power draw.
    -DDISABLE_USB_AFTER_BOOT
lib_deps =
    https://github.com/bitbank2/FastEPD.git#main
    bitbank2/bb_captouch@^1.3.2
extra_scripts =
    pre:tools/patch_fastepd_glyph_width.py
